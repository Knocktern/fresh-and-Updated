services:
  - type: web
    name: hireme-platform
    env: python
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn -w 4 --threads 2 --bind 0.0.0.0:$PORT run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USE_TLS
        value: True
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: hireme-db
          property: connectionString

databases:
  - name: hireme-db
    databaseName: hireme_production
    user: hireme_user
